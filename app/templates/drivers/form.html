{% extends "base.html" %}

{% block title %}{{ action }} Driver - Jolly Cabs{% endblock %}

{% block content %}
<div class="page-header">
    <div class="page-title-area">
        <h1 class="page-title">{{ action }} Driver</h1>
        <span class="page-subtitle">{% if action == 'Add' %}Register a new driver in the operations suite{% else %}Modify existing driver registry details{% endif %}</span>
    </div>
    <div class="page-actions">
        <a href="{{ url_for('drivers.index') }}" class="btn btn-secondary">
            <i class="fa-solid fa-arrow-left"></i> Back to List
        </a>
    </div>
</div>

<div class="form-card">
    <form action="{% if action == 'Add' %}{{ url_for('drivers.add') }}{% else %}{{ url_for('drivers.edit', driver_id=driver.id) }}{% endif %}" method="POST">
        
        <div class="form-grid">
            <div class="form-group">
                <label class="form-label" for="name">Driver Full Name *</label>
                <input class="form-control" type="text" id="name" name="name" required placeholder="e.g. Rajesh Kumar" value="{{ driver.name if driver else '' }}">
            </div>
            
            <div class="form-group">
                <label class="form-label" for="phone">Phone Number *</label>
                <input class="form-control" type="tel" id="phone" name="phone" required placeholder="e.g. +91 9876543210" value="{{ driver.phone if driver else '' }}">
            </div>
            
            <div class="form-group">
                <label class="form-label" for="email">Email Address *</label>
                <input class="form-control" type="email" id="email" name="email" required placeholder="e.g. rajesh@jollycabs.in" value="{{ driver.email if driver else '' }}">
            </div>
            
            <div class="form-group">
                <label class="form-label" for="license_number">Driving License Number *</label>
                <input class="form-control" type="text" id="license_number" name="license_number" required placeholder="e.g. DL-1420110012345" {% if action == 'Edit' %}readonly{% endif %} value="{{ driver.license_number if driver else '' }}">
            </div>
            
            <div class="form-group">
                <label class="form-label" for="license_expiry">License Expiration Date *</label>
                <input class="form-control" type="date" id="license_expiry" name="license_expiry" required value="{{ driver.license_expiry.strftime('%Y-%m-%d') if (driver and driver.license_expiry) else '' }}">
            </div>
            
            <div class="form-group">
                <label class="form-label" for="availability">Availability State</label>
                <select class="form-control" id="availability" name="availability">
                    <option value="Available" {% if driver and driver.availability == 'Available' %}selected{% endif %}>Available</option>
                    <option value="Busy" {% if driver and driver.availability == 'Busy' %}selected{% endif %}>Busy</option>
                    <option value="Off-Duty" {% if driver and driver.availability == 'Off-Duty' %}selected{% endif %}>Off-Duty</option>
                </select>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="status">Employment Status</label>
                <select class="form-control" id="status" name="status">
                    <option value="Active" {% if driver and driver.status == 'Active' %}selected{% endif %}>Active</option>
                    <option value="Suspended" {% if driver and driver.status == 'Suspended' %}selected{% endif %}>Suspended</option>
                    <option value="Inactive" {% if driver and driver.status == 'Inactive' %}selected{% endif %}>Inactive</option>
                </select>
            </div>
            
            <div class="form-group form-group-full">
                <label class="form-label" for="address">Permanent Address *</label>
                <textarea class="form-control" id="address" name="address" rows="3" required placeholder="Enter house number, street, city, and state...">{{ driver.address if driver else '' }}</textarea>
            </div>
        </div>
        
        <div style="display: flex; gap: 12px; justify-content: flex-end; margin-top: 12px;">
            <a href="{{ url_for('drivers.index') }}" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary">
                <i class="fa-solid fa-floppy-disk"></i> Save Driver Profile
            </button>
        </div>
    </form>
</div>
{% endblock %}
